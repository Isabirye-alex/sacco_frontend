<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MazaoSACCO - Savings Dashboard</title>
    
    <!-- Bootstrap 5.3 CSS & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- External Web Components Script -->
    <script src="components.js" defer></script>
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #F4F7FA;
            color: #1A202C;
            overflow: hidden; /* Prevent global body scroll */
        }
        
        /* Fixed Sidebar Styles */
        .sidebar {
            background-color: #F8FAFC;
            height: 100vh;
            border-right: 1px solid #E2E8F0;
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            z-index: 100;
        }
        .sidebar-brand {
            color: #0F2942;
            font-weight: 700;
            font-size: 1.25rem;
        }
        .sidebar-sub {
            font-size: 0.8rem;
            color: #718096;
        }
        .nav-link {
            color: #4A5568;
            font-weight: 500;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }
        .nav-link.active {
            background-color: #EBF4FF !important;
            color: #2B6CB0 !important;
            border-left: 4px solid #3182CE;
        }
        .nav-link:hover:not(.active) {
            background-color: #EDF2F7;
            color: #1A202C;
        }
        .sidebar-profile {
            position: absolute;
            bottom: 20px;
            left: 15px;
            right: 15px;
            border-top: 1px solid #E2E8F0;
            padding-top: 15px;
            background-color: #F8FAFC;
        }

        /* Fixed Top Navbar Styles */
        .top-navbar {
            background-color: #ffffff;
            border-bottom: 1px solid #E2E8F0;
            padding: 0.75rem 2rem;
            position: fixed;
            top: 0;
            right: 0;
            left: 260px;
            height: 70px;
            z-index: 90;
        }
        .search-input {
            background-color: #EDF2F7;
            border: none;
            border-radius: 20px;
            padding-left: 2.5rem;
            width: 320px !important;
        }
        .search-icon-wrapper {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #718096;
            z-index: 10;
        }

        /* Scrollable Main Content Pane */
        .main-content {
            margin-left: 260px;
            padding-top: 70px;
            height: 100vh;
            overflow-y: auto; /* Only this frame scrolls */
        }
    </style>
</head>
<body>

    <!-- 1. STATIC SIDEBAR -->
    <app-sidebar active-page="savings"></app-sidebar>

    <div class="main-wrapper">
        
        <!-- 2. FIXED TOP NAVBAR -->
        <app-navbar title="Savings"></app-navbar>

        <!-- 3. SCROLLABLE CONTENT BODY -->
        <main class="main-content">
            <div class="container-fluid p-4" style="max-width: 1200px; margin: 0 auto;">
                
                <!-- Put your savings overview balance card, tables, and graphs here -->
                 <p>Your content will scroll neatly here beneath a fixed header and next to a static sidebar!</p>
                 
            </div>
        </main>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
