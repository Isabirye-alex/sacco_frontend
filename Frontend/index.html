<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MazaoSACCO - Member Login</title>
    <!-- Latest Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons for show/hide password and security indicators -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts (Inter) to match the dashboard exactly -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F4F7FA;
            color: #1A202C;
        }
        
        .login-card {
            background: #ffffff;
            border: 1px solid #E2E8F0;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        .brand-title {
            color: #0F2942; /* Matches MazaoSACCO primary color from screen.jpg */
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .form-label {
            font-weight: 500;
            color: #4A5568;
            font-size: 0.9rem;
        }

        .form-control {
            padding: 0.65rem 1rem;
            border-color: #CBD5E1;
            border-radius: 8px;
        }

        .form-control:focus {
            border-color: #1A569B;
            box-shadow: 0 0 0 3px rgba(26, 86, 155, 0.15);
        }

        /* Password Wrapper toggle positioning */
        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #718096;
            z-index: 10;
        }

        .btn-primary-sacco {
            background-color: #0A3B75; /* Exact color match from banner in screen.jpg */
            border-color: #0A3B75;
            font-weight: 600;
            padding: 0.65rem 1rem;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .btn-primary-sacco:hover {
            background-color: #1A569B;
            border-color: #1A569B;
        }

        .btn-primary-sacco:active {
            background-color: #0F2942 !important;
            border-color: #0F2942 !important;
        }
    </style>
</head>
<body class="d-flex align-items-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-10 col-sm-8 col-md-6 col-lg-4">
                
                <div class="login-card p-4 p-sm-5">
                    
                    <!-- Header -->
                    <div class="text-center mb-4">
                        <h2 class="brand-title mb-1">MazaoSACCO</h2>
                        <p class="text-muted small">Securely manage your savings & credit</p>
                    </div>

                    <!-- Alert message container for login failures -->
                    <div id="alert-box" class="alert alert-danger d-none py-2 px-3 small" role="alert"></div>

                    <!-- Login Form -->
                    <form id="login-form" novalidate>
                        <!-- Email Input -->
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="email" required placeholder="name@example.com" autocomplete="email">
                        </div>
                        
                        <!-- Password Input with Show/Hide toggle -->
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <div class="password-wrapper">
                                <input type="password" class="form-control" id="password" required placeholder="••••••••" autocomplete="current-password">
                                <i class="bi bi-eye password-toggle" id="togglePassword"></i>
                            </div>
                        </div>

                        <!-- Remember Me & Forgot Password Utilities -->
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label text-muted small" for="rememberMe">Remember me</label>
                            </div>
                            <a href="#" class="text-decoration-none small fw-medium" style="color: #1A569B;">Forgot password?</a>
                        </div>

                        <!-- Submit Button -->
                        <button type="submit" class="btn btn-primary-sacco w-100">Sign In</button>
                    </form>
                    
                    <!-- Footer Info -->
                    <div class="text-center mt-4 pt-2 border-top">
                        <span class="text-muted d-block" style="font-size: 0.8rem;">Not a member yet?</span>
                        <span class="small fw-semibold" style="color: #0F2942;">Contact your system administrator</span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap 5.3 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Functional JS utility for showing/hiding password values -->
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function () {
            // Toggle the type attribute
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            
            // Toggle the icon
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });
    </script>
    
    <!-- Your Authentication JS file -->
    <script src="js/auth.js"></script>
</body>
</html>
