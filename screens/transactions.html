<div class="screen-inner" id="screen-transactions">
    <div class="filter-bar">
        <div class="filter-chip active" data-type="all">All</div>
        <div class="filter-chip" data-type="deposit">Deposits</div>
        <div class="filter-chip" data-type="withdrawal">Withdrawals</div>
        <div class="filter-chip" data-type="loan">Loan payments</div>
        <div class="filter-chip" data-type="dividend">Dividends</div>
    </div>
    <div class="tx-table">
        <div class="tx-hdr"><span>Description</span><span>Date</span><span>Type</span><span>Ref</span><span
                style="text-align:right;">Amount</span></div>
        <div id="transactions-table-body"></div>
    </div>
    <div style="display:flex;justify-content:center;margin-top:14px;gap:6px;">
        <button class="bal-btn"
            style="font-size:12px;color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);background:#fff;">←
            Prev</button>
        <button class="bal-btn" style="font-size:12px;background:#1a2e1a;color:#fff;border:none;">1</button>
        <button class="bal-btn"
            style="font-size:12px;color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);background:#fff;">2</button>
        <button class="bal-btn"
            style="font-size:12px;color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);background:#fff;">3</button>
        <button class="bal-btn"
            style="font-size:12px;color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);background:#fff;">Next
            →</button>
    </div>
</div>
