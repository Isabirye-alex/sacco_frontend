<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platform Member Portal</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-toggle-wrap">
        <div class="sidebar-logo">
          <div class="logo-mark">
            <div class="logo-icon">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M9 2L15 5.5V12.5L9 16L3 12.5V5.5L9 2Z" fill="white" fill-opacity="0.9" />
                <path d="M9 6L12 7.75V11.25L9 13L6 11.25V7.75L9 6Z" fill="white" fill-opacity="0.3" />
              </svg>
            </div>
            <div>
              <div class="logo-text">Little</div>
              <div class="logo-sub">Member Portal</div>
            </div>
          </div>
        </div>
        <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="Toggle sidebar">☰</button>
      </div>
      <div class="nav-section">
        <div class="nav-label">Main</div>
        <div class="nav-item active" data-screen="dashboard"><i class="ti ti-layout-dashboard"
            aria-hidden="true"></i><span class="nav-text">Dashboard</span></div>
        <div class="nav-item" data-screen="savings"><i class="ti ti-piggy-bank" aria-hidden="true"></i><span
            class="nav-text">Savings</span></div>
        <div class="nav-item" data-screen="loans"><i class="ti ti-cash" aria-hidden="true"></i><span
            class="nav-text">Loans</span><span class="badge">1</span></div>
        <div class="nav-item" data-screen="transactions"><i class="ti ti-arrows-exchange" aria-hidden="true"></i><span
            class="nav-text">Transactions</span></div>
      </div>
      <div class="nav-section">
        <div class="nav-label">Account</div>
        <div class="nav-item" data-screen="profile"><i class="ti ti-user-circle" aria-hidden="true"></i><span
            class="nav-text">Profile</span></div>
        <div class="nav-item"><i class="ti ti-headset" aria-hidden="true"></i><span class="nav-text">Support</span>
        </div>
      </div>
      <div class="sidebar-footer">
        <div class="user-row">
          <div class="avatar" id="avatar-initials">AK</div>
          <div class="user-info">
            <div class="user-name" id="member-name">Amara Kiprotich</div>
            <div class="user-role" id="member-role">Member #00142</div>
          </div>
          <i class="ti ti-dots-vertical" style="color:rgba(255,255,255,0.3);font-size:15px;" aria-hidden="true"></i>
        </div>
      </div>
    </aside>
    <div class="content">
      <div class="topbar">
        <div class="topbar-title" id="page-title">Dashboard</div>
        <div class="topbar-search">
          <i class="ti ti-search" aria-hidden="true"></i>
          <input type="text" placeholder="Search transactions..." id="transaction-search-input"
            class="transaction-search">
        </div>
        <div class="notif-btn"><i class="ti ti-bell" aria-hidden="true"></i>
          <div class="notif-dot"></div>
        </div>
      </div>
      <div class="screen" id="screen-root"></div>
    </div>
  </div>
  <script type="module" src="js/app.js"></script>
</body>

</html>
